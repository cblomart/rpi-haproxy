build:
  image: cblomart/rpi-basebuild
  volumes:
    - /var/run/docker.sock:/var/run/docker.sock
  commands:
    - make 
    - docker build -t cblomart/rpi-haproxy .
publish:
  docker:
    username: cblomart
    password: $$DOCKERHUB_PASS
    email: cblomart@gmail.com
    repo: cblomart/rpi-haproxy
    insecure: true
    tag:
       - $$BRANCH
       - $$COMMIT
  bintray:
    image: cblomart/rpi-drone-bintray
    username: cblomart
    password: $$DOCKERHUB_PASS
    branch: $$BRANCH
    api_key: 8a30bf4edfccaa3b8520d37431b4dc2f8fd11e00
    artifacts:
      - file:  haproxy
        owner: cblomart
        type: executable
        repository: files
        package: haproxy
        version: 1.6.5
        target: haproxy
        publish: true
        override: true
